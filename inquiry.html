<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Inquiry</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .form-box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h2 { text-align: center; margin-bottom: 20px; }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }
    button {
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .success {
      color: green;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>New Inquiry</h2>

    <form id="inquiryForm">
      <input type="text" name="clientName" placeholder="Client Name" required />
      <input type="text" name="companyName" placeholder="Company Name" />
      <input type="tel" name="phone" placeholder="Phone" />
      <input type="email" name="email" placeholder="Email" />
      <input type="text" name="source" placeholder="Inquiry Source" />
      <input type="text" name="product" placeholder="Product Interest" />
      <input type="number" name="quantity" placeholder="Quantity" />
      <input type="text" name="budget" placeholder="Budget" />
      <input type="date" name="deliveryDate" />
      <textarea name="notes" placeholder="Notes"></textarea>

      <button type="submit">Save Inquiry</button>
    </form>

    <div class="success" id="msg"></div>
  </div>

  <script>
  const SCRIPT_URL = https://script.google.com/macros/s/AKfycbxiBcV6ZhX2PhHBEjJIGvlOuZZklP2WoOPlYmcsk9chxrwkddCcLsRNqDIpuxNg8JVN/exec;

  document.getElementById("inquiryForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.action = "addInquiry";

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    })
    .then(() => {
      document.getElementById("msg").innerText =
        "✅ Inquiry submitted successfully";
      document.getElementById("inquiryForm").reset();
    })
    .catch(() => {
      document.getElementById("msg").innerText =
        "❌ Error submitting inquiry";
    });
  });
</script>

</body>
</html>
