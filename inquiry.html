<!DOCTYPE html>
<html>
<head>
  <title>New Inquiry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #0b1b2b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #122b44;
    }
    #msg {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>New Inquiry</h2>

  <form id="inquiryForm" onsubmit="return false;">
    <input name="clientName" placeholder="Client Name" required>
    <input name="companyName" placeholder="Company Name">
    <input name="phone" placeholder="Phone">
    <input name="email" placeholder="Email">
    <input name="inquirySource" placeholder="Inquiry Source">
    <input name="productInterest" placeholder="Product Interest">
    <input name="quantity" placeholder="Quantity">
    <input name="budget" placeholder="Budget">
    
    <!-- Meeting Date -->
    <input type="date" name="meetingDate">

    <textarea name="notes" placeholder="Notes"></textarea>

    <button type="button" onclick="submitForm()">Save Inquiry</button>
  </form>

  <div id="msg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiBcV6ZhX2PhHBEjJIGvlOuZZklP2WoOPlYmcsk9chxrwkddCcLsRNqDIpuxNg8JVN/exec";

function submitForm() {
  const form = document.getElementById("inquiryForm");
  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());
  data.action = "addInquiry";

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("msg").innerText = "✅ Inquiry saved successfully!";
    form.reset();
  })
  .catch(err => {
    document.getElementById("msg").innerText = "❌ Error saving inquiry";
    console.error(err);
  });
}
</script>

</body>
</html>
